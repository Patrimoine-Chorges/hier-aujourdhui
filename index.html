<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1f3326" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="manifest.webmanifest" />
  <title>CHORGES – Hier & Aujourd’hui</title>
  <link rel="stylesheet" href="style.css?v=100" />
</head>
<body>
  <video id="camera" autoplay playsinline muted></video>
  <img id="oldPhoto" alt="Vue ancienne superposée" />
  <div id="comparisonSurface" aria-label="Faites glisser le doigt pour comparer"></div>
  <div id="comparisonDivider" aria-hidden="true">
    <span class="comparison-grip">↔</span>
  </div>

  <main id="welcome" class="welcome">
    <div class="welcome-logo-wrap">
      <img class="welcome-logo" src="logo.png" alt="CHORGES – Hier & Aujourd’hui" />
    </div>

    <section class="welcome-card">
      <p class="welcome-text">
        Placez-vous dans les empreintes,<br>
        puis comparez le paysage actuel<br>
        avec la vue ancienne.
      </p>
      <button id="startBtn" type="button">Commencer <span>→</span></button>
    </section>
  </main>

  <header id="topBar">
    <img class="top-logo" src="logo.png" alt="" />
    <div class="top-brand">
      <div class="brand">CHORGES</div>
      <div class="baseline">Hier & Aujourd’hui</div>
    </div>
    <div class="top-separator"></div>
    <div class="top-place">
      <div id="placeTitle" class="place-title">Chargement…</div>
      <div id="placePrecision" class="place-precision"></div>
      <div id="placeDate" class="place-date"></div>
    </div>
  </header>

  <footer id="bottomBar">
    <div class="slider-wrap">
      <span>Aujourd’hui</span>
      <input id="opacitySlider" type="range" min="0" max="100" step="1" value="50" aria-label="Comparaison avant après" />
      <span id="pastLabel">Autrefois</span>
    </div>
    <div class="action-row">
      <button id="adjustBtn" class="antique-icon-btn" type="button" aria-label="Ajuster la photographie" title="Ajuster">
        <svg viewBox="0 0 64 64" aria-hidden="true">
      <circle cx="32" cy="32" r="24"/>
      <circle cx="32" cy="32" r="10"/>
      <path d="M32 4v12M32 48v12M4 32h12M48 32h12M12 12l9 9M43 43l9 9M52 12l-9 9M21 43l-9 9"/>
      <path d="M28 32h8M32 28v8"/>
    </svg>
      </button>
      <button id="resetBtn" class="antique-icon-btn" type="button" aria-label="Recentrer la photographie" title="Recentrer">
        <svg viewBox="0 0 64 64" aria-hidden="true">
      <circle cx="32" cy="32" r="25"/>
      <path d="M32 7v10M32 47v10M7 32h10M47 32h10"/>
      <path d="M32 14l5 13 13 5-13 5-5 13-5-13-13-5 13-5z"/>
      <circle cx="32" cy="32" r="4"/>
    </svg>
      </button>
      <button id="hideBtn" class="antique-icon-btn" type="button" aria-label="Masquer la photographie ancienne" title="Masquer">
        <svg viewBox="0 0 64 64" aria-hidden="true">
      <path d="M5 32s10-16 27-16 27 16 27 16-10 16-27 16S5 32 5 32z"/>
      <circle cx="32" cy="32" r="9"/>
      <path class="icon-slash" d="M11 53L53 11"/>
    </svg>
      </button>
      <button id="fullscreenBtn" class="antique-icon-btn" type="button" aria-label="Passer en plein écran" title="Plein écran">
        <svg class="icon-enter" viewBox="0 0 64 64" aria-hidden="true">
      <path d="M8 25V8h17M39 8h17v17M56 39v17H39M25 56H8V39"/>
      <path d="M8 8l17 17M56 8L39 25M56 56L39 39M8 56l17-17"/>
    </svg>
    <svg class="icon-exit" viewBox="0 0 64 64" aria-hidden="true">
      <path d="M25 8v17H8M39 8v17h17M56 39H39v17M8 39h17v17"/>
      <path d="M25 25L8 8M39 25L56 8M39 39l17 17M25 39L8 56"/>
    </svg>
      </button>
    </div>
  </footer>


  <button id="guidanceBtn" class="floating-guidance antique-icon-btn" type="button"
          aria-label="Afficher le guidage GPS" title="Guidage GPS" hidden>
    <svg viewBox="0 0 64 64" aria-hidden="true">
      <circle cx="32" cy="32" r="25"/>
      <path d="M39 25l-7-15-7 15-15 7 15 7 7 15 7-15 15-7z"/>
      <circle cx="32" cy="32" r="4"/>
      <path d="M32 7v6M32 51v6M7 32h6M51 32h6"/>
    </svg>
  </button>

  <div id="errorBox" role="alert"></div>
  <script src="script.js?v=100"></script>

<script>
(function(){
  const btn = document.getElementById("startBtn");
  if (!btn || btn.dataset.cameraFixed) return;
  btn.dataset.cameraFixed = "1";
  btn.addEventListener("click", async function(){
    const camera = document.getElementById("camera");
    const welcome = document.getElementById("welcome");
    if (camera && camera.srcObject) {
      if (welcome) welcome.classList.add("hidden");
      return;
    }
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: { ideal: "environment" } },
        audio: false
      });
      if (camera) camera.srcObject = stream;
      if (welcome) welcome.classList.add("hidden");
    } catch(e) {
      alert("Impossible d’ouvrir la caméra. Autorisez la caméra dans le navigateur.");
    }
  });
})();
</script>

</body>
</html>
